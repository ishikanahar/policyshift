# Full GPU LoRA SFT (documented; not required for smoke tests)
seed: 42
smoke: false
max_steps: 200
learning_rate: 2.0e-4
lora_r: 16
lora_alpha: 32
max_seq_length: 1024
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
fp16: true
model_name_or_path: Qwen/Qwen2.5-0.5B-Instruct
train_file: data/generated/sft/sft_train.jsonl
output_dir: artifacts/experiments/sft-qwen05b/checkpoints
hardware: >
  Recommended: 1x NVIDIA GPU with >=16GB VRAM (or QLoRA on 8GB with bitsandbytes).
command: >
  pip install 'policyshift[training]'
  python scripts/generate_teacher_trajectories.py --n-cases 80 --out data/generated/teacher
  # build SFT jsonl from accepted trajectories (or run train_distill_smoke.py)
  python scripts/train_sft.py --config configs/sft/full_gpu.yaml

# Clean temporal shift SFT: train only on policy 1.0 + 1.1
smoke: false
seed: 42
num_train_epochs: 1
max_steps: -1
learning_rate: 0.0002
lora_r: 16
lora_alpha: 32
max_seq_length: 512
per_device_train_batch_size: 1
gradient_accumulation_steps: 1
fp16: true
model_name_or_path: Qwen/Qwen2.5-0.5B-Instruct
train_file: data/shift_clean/sft/sft_train.jsonl
output_dir: artifacts/experiments/shift-clean/sft/checkpoints
policy_versions: "1.0,1.1"
require_shift_validation: true
notes: |
  Clean shift-clean SFT. Do not overwrite sft-qwen05b debug adapters.
  python scripts/run_clean_shift_experiment.py --prepare-data --validate
  python scripts/run_clean_shift_experiment.py --train-sft
